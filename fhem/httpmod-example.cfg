# Example FHEM HTTPMOD setup.
#
# Use this if you do not want MQTT. Replace the host with the RPi/Docker host
# or the bridge container name/IP.

define midea.portasplit.http HTTPMOD http://127.0.0.1:8765/state 30
attr midea.portasplit.http alias Midea PortaSplit
attr midea.portasplit.http room Klima
attr midea.portasplit.http extractAllJSON 1
attr midea.portasplit.http stateFormat power mode target_temperature °C indoor_temperature °C real_time_power_usage W

attr midea.portasplit.http set01Name power
attr midea.portasplit.http set01Hint on,off
attr midea.portasplit.http set01URL http://127.0.0.1:8765/set?power=$val

attr midea.portasplit.http set02Name target_temperature
attr midea.portasplit.http set02Hint slider,16,0.5,30
attr midea.portasplit.http set02URL http://127.0.0.1:8765/set?target_temperature=$val

attr midea.portasplit.http set03Name mode
attr midea.portasplit.http set03Hint auto,cool,dry,heat,fan_only
attr midea.portasplit.http set03URL http://127.0.0.1:8765/set?mode=$val

attr midea.portasplit.http set04Name fan_speed
attr midea.portasplit.http set04Hint auto,silent,low,medium,high,max
attr midea.portasplit.http set04URL http://127.0.0.1:8765/set?fan_speed=$val

attr midea.portasplit.http set05Name swing_mode
attr midea.portasplit.http set05Hint off,vertical,horizontal,both
attr midea.portasplit.http set05URL http://127.0.0.1:8765/set?swing_mode=$val

attr midea.portasplit.http set06Name out_silent
attr midea.portasplit.http set06Hint on,off
attr midea.portasplit.http set06URL http://127.0.0.1:8765/set?out_silent=$val

