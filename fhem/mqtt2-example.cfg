# Example FHEM MQTT2 setup.
#
# 1. Create or use an MQTT broker. FHEM can provide one:
#
# define mqtt2_server MQTT2_SERVER 1883 global
#
# If FHEM runs in Docker, expose port 1883 or put the bridge container into a
# Docker network that can reach the FHEM container.
#
# 2. Configure the bridge:
#
# MQTT_ENABLE=true
# MQTT_HOST=<broker-or-fhem-ip>
# MQTT_TOPIC_PREFIX=fhem/midea/portasplit
#
# 3. Define the device manually, or let MQTT2 autocreate and then adapt:

define midea.portasplit MQTT2_DEVICE midea_portasplit
attr midea.portasplit alias Midea PortaSplit
attr midea.portasplit room Klima
attr midea.portasplit readingList fhem/midea/portasplit/state:.* { json2nameValue($EVENT) }
attr midea.portasplit setList \
  power:on,off fhem/midea/portasplit/set/power $EVTPART1 \
  target_temperature:slider,16,0.5,30 fhem/midea/portasplit/set/target_temperature $EVTPART1 \
  mode:auto,cool,dry,heat,fan_only fhem/midea/portasplit/set/mode $EVTPART1 \
  fan_speed:auto,silent,low,medium,high,max fhem/midea/portasplit/set/fan_speed $EVTPART1 \
  swing_mode:off,vertical,horizontal,both fhem/midea/portasplit/set/swing_mode $EVTPART1 \
  out_silent:on,off fhem/midea/portasplit/set/out_silent $EVTPART1 \
  eco:on,off fhem/midea/portasplit/set/eco $EVTPART1 \
  turbo:on,off fhem/midea/portasplit/set/turbo $EVTPART1 \
  display_on:on,off fhem/midea/portasplit/set/display_on $EVTPART1
attr midea.portasplit stateFormat power mode target_temperature °C indoor_temperature °C real_time_power_usage W

